apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server-app
  template:
    metadata:
      labels:
        app: eureka-server-app
    spec:
      containers:
        - name: eureka-server-app
          image: eurekaserver:latest # same as your docker build
          imagePullPolicy: Never # IMPORTANT for Minikube local image
          ports:
            - containerPort: 8761
          env:
            - name: CONFIG_SERVER_URL
              value: "http://config-server-svc:9296"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server-svc
spec:
  selector:
    app: eureka-server-app
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761
  type: NodePort
